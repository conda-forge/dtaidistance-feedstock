{% set name = "dtaidistance" %}
{% set version = "2.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: bd4066800254fbd5b620e6462bb759c9d85b79ac2080b354cedc901f446b6c82
  patches:
    - force-cythonize.patch

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
  host:
    - cython
    - numpy
    - pip
    - python
    - setuptools
    - wheel
  run:
    - matplotlib-base >=3.0.0
    - python
    - scipy

test:
  imports:
    - dtaidistance
    - dtaidistance.clustering
    - dtaidistance.dtw
    - dtaidistance.dtw_cc
    - dtaidistance.dtw_cc_numpy
    - dtaidistance.dtw_cc_omp
    - dtaidistance.ed_cc

about:
  home: https://github.com/wannesm/dtaidistance
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Distance measures for time series
  doc_url: https://dtaidistance.readthedocs.io/en/latest/
  dev_url: https://github.com/wannesm/dtaidistance

extra:
  recipe-maintainers:
    - wannesm
    - m-rossi
